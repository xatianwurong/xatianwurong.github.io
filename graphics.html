<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图形学基础原理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        /* ========================================
           GitHub Markdown 样式 - 精确还原
           ======================================== */
        
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
            font-size: 16px;
            line-height: 1.5;
            color: #1f2328;
            background-color: #ffffff;
            word-wrap: break-word;
        }

        /* 页面容器 */
        .page-container {
            max-width: 1012px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Markdown 内容区域 */
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            color: #1f2328;
        }

        /* 标题样式 */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #1f2328;
        }

        .markdown-body h1 {
            font-size: 2em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #d0d7de;
        }

        .markdown-body h2 {
            font-size: 1.5em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #d0d7de;
        }

        .markdown-body h3 {
            font-size: 1.25em;
        }

        .markdown-body h4 {
            font-size: 1em;
        }

        .markdown-body h5 {
            font-size: 0.875em;
        }

        .markdown-body h6 {
            font-size: 0.85em;
            color: #656d76;
        }

        /* 段落样式 */
        .markdown-body p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        /* 链接样式 */
        .markdown-body a {
            background-color: transparent;
            color: #0969da;
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body a:active,
        .markdown-body a:hover {
            outline-width: 0;
        }

        /* 粗体和斜体 */
        .markdown-body strong {
            font-weight: 600;
        }

        .markdown-body em {
            font-style: italic;
        }

        /* 删除线 */
        .markdown-body del {
            text-decoration: line-through;
        }

        /* 代码样式 - 行内 */
        .markdown-body code {
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
            font-size: 85%;
            padding: 0.2em 0.4em;
            margin: 0;
            background-color: rgba(175, 184, 193, 0.2);
            border-radius: 6px;
            color: inherit;
        }

        /* 代码块样式 */
        .markdown-body pre {
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
            margin-top: 0;
            margin-bottom: 16px;
            word-wrap: normal;
            border: 1px solid #d0d7de;
        }

        .markdown-body pre code {
            display: inline;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
            font-size: 100%;
        }

        /* 列表样式 */
        .markdown-body ul,
        .markdown-body ol {
            margin-top: 0;
            margin-bottom: 16px;
            padding-left: 2em;
        }

        .markdown-body ul ul,
        .markdown-body ul ol,
        .markdown-body ol ol,
        .markdown-body ol ul {
            margin-top: 0;
            margin-bottom: 0;
        }

        .markdown-body li {
            margin: 0.25em 0;
        }

        .markdown-body li > p {
            margin-top: 16px;
        }

        .markdown-body li + li {
            margin-top: 0.25em;
        }

        /* 任务列表 */
        .markdown-body ul.contains-task-list {
            list-style-type: none;
            padding-left: 0;
        }

        .markdown-body .task-list-item {
            list-style-type: none;
        }

        .markdown-body .task-list-item-checkbox {
            margin: 0 0.2em 0.25em -1.6em;
            vertical-align: middle;
        }

        /* 引用块样式 */
        .markdown-body blockquote {
            margin: 0 0 16px;
            padding: 0 1em;
            color: #656d76;
            border-left: 0.25em solid #d0d7de;
        }

        .markdown-body blockquote > :first-child {
            margin-top: 0;
        }

        .markdown-body blockquote > :last-child {
            margin-bottom: 0;
        }

        /* 表格样式 */
        .markdown-body table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-top: 0;
            margin-bottom: 16px;
            width: 100%;
            overflow: auto;
            display: block;
        }

        .markdown-body table th {
            font-weight: 600;
            background-color: #f6f8fa;
        }

        .markdown-body table th,
        .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #d0d7de;
        }

        .markdown-body table tr {
            background-color: #ffffff;
            border-top: 1px solid #d0d7de;
        }

        .markdown-body table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        .markdown-body table img {
            background-color: transparent;
        }

        /* 水平分割线 */
        .markdown-body hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #d0d7de;
            border: 0;
        }

        /* 图片样式 */
        .markdown-body img {
            max-width: 100%;
            box-sizing: content-box;
            background-color: #ffffff;
            border-style: none;
        }

        .markdown-body img[align=right] {
            padding-left: 20px;
        }

        .markdown-body img[align=left] {
            padding-right: 20px;
        }

        /* 图片容器 */
        .markdown-body .emoji {
            max-width: none;
            vertical-align: text-top;
            background-color: transparent;
        }

        /* 高亮标记 */
        .markdown-body mark {
            background-color: #fff8c5;
            color: #1f2328;
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }

        /* 脚注 */
        .markdown-body .footnotes {
            font-size: 12px;
            color: #656d76;
            border-top: 1px solid #d0d7de;
            margin-top: 24px;
            padding-top: 16px;
        }

        /* 数学公式样式 */
        .katex-display {
            margin: 16px 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 16px;
            background-color: #f6f8fa;
            border-radius: 6px;
        }

        /* 目录样式 */
        .toc {
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .toc h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #1f2328;
        }

        .toc ul {
            list-style-type: none;
            padding-left: 0;
            margin: 0;
        }

        .toc li {
            margin: 4px 0;
        }

        .toc a {
            color: #0969da;
            font-size: 14px;
            text-decoration: none;
        }

        .toc a:hover {
            text-decoration: underline;
        }

        /* 顶部标题栏 */
        .header {
            background-color: #24292f;
            color: #ffffff;
            padding: 24px 32px;
            border-bottom: 1px solid #d0d7de;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 400;
            margin: 0;
            color: #ffffff;
        }

        .header p {
            font-size: 14px;
            color: #8b949e;
            margin: 8px 0 0 0;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 32px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            appearance: none;
            color: #24292f;
            background-color: #f6f8fa;
            box-shadow: 0 1px 0 rgba(27, 31, 36, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            text-decoration: none;
            transition: 80ms cubic-bezier(0.33, 1, 0.68, 1);
            transition-property: color, background-color, box-shadow, border-color;
        }

        .back-btn:hover {
            background-color: #f3f4f6;
            border-color: rgba(27, 31, 36, 0.15);
            text-decoration: none;
        }

        .back-btn:active {
            background-color: hsla(220, 14%, 93%, 1);
            box-shadow: inset 0 1px 0 rgba(27, 31, 36, 0.2);
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 64px;
            color: #656d76;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #d0d7de;
            border-top-color: #0969da;
            border-radius: 50%;
            animation: spinner 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spinner {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-message {
            text-align: center;
            padding: 64px;
            color: #cf222e;
        }

        /* 响应式设计 */
        @media (max-width: 767px) {
            .page-container {
                padding: 16px;
            }

            .header {
                padding: 16px;
            }

            .markdown-body h1 {
                font-size: 1.5em;
            }

            .markdown-body h2 {
                font-size: 1.25em;
            }

            .markdown-body h3 {
                font-size: 1.125em;
            }
        }

        /* 打印样式 */
        @media print {
            body {
                background-color: #ffffff;
            }

            .header {
                background-color: #ffffff;
                color: #1f2328;
                border-bottom: 1px solid #d0d7de;
            }

            .header h1 {
                color: #1f2328;
            }

            .back-btn {
                display: none;
            }
        }

        /* 选择文本样式 */
        ::selection {
            background-color: #0969da;
            color: #ffffff;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 图形学基础原理</h1>
        <p>深度完整版 - 深入理解渲染的本质、坐标系变换的设计哲学、光栅化的底层原理</p>
    </div>

    <div class="page-container">
        <div id="markdown-content" class="markdown-body">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载文档...</p>
            </div>
        </div>
        <a href="index.html" class="back-btn">← 返回主页</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const md = window.markdownit({
            html: true,
            linkify: true,
            typographer: true,
            breaks: false,
            highlight: function (str, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(str, { language: lang }).value;
                    } catch (__) {}
                }
                return md.utils.escapeHtml(str);
            }
        });

        async function loadMarkdown() {
            try {
                const response = await fetch('001.md');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const markdownText = await response.text();
                
                const html = md.render(markdownText);
                document.getElementById('markdown-content').innerHTML = html;
                
                renderMathInElement(document.getElementById('markdown-content'), {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false,
                    strict: false
                });
                
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                
            } catch (error) {
                console.error('加载Markdown文件失败:', error);
                document.getElementById('markdown-content').innerHTML = `
                    <div class="error-message">
                        <h2>❌ 加载失败</h2>
                        <p>无法加载Markdown文件，请确保001.md文件存在。</p>
                        <p style="font-size: 14px; color: #656d76; margin-top: 16px;">错误信息: ${error.message}</p>
                    </div>
                `;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadMarkdown);
        } else {
            loadMarkdown();
        }
    </script>
</body>
</html>
