<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图形学基础原理</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" integrity="sha512-7aFhVJkQEKGDqYYq1xJ1g5sXy9GevS0K1qk1VlmJWxPOG8O7r7vL3h0G9SvpTfd8qXQV99M1E6O4cLzG3vK7UQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        /* ========================================
           GitHub Markdown 样式 - 精确还原
           ======================================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
            font-size: 16px;
            line-height: 1.5;
            color: #1f2328;
            background-color: #ffffff;
            word-wrap: break-word;
        }

        .page-container {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 0;
        }

        .content {
            padding: 0 16px;
        }

        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            color: #1f2328;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #1f2328;
            scroll-margin-top: 20px;
        }

        .markdown-body h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #eaecef; }
        .markdown-body h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #eaecef; }
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body h4 { font-size: 1em; }
        .markdown-body h5 { font-size: 0.875em; }
        .markdown-body h6 { font-size: 0.85em; color: #656d76; }

        .markdown-body p { margin-top: 0; margin-bottom: 16px; }
        .markdown-body a { color: #0366d6; text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body strong { font-weight: 600; }
        .markdown-body em { font-style: italic; }

        .markdown-body code {
            font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.85em;
            padding: 0.2em 0.4em;
            margin: 0;
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
        }

        .markdown-body pre {
            font-family: "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.85em;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
            margin-top: 0;
            margin-bottom: 16px;
            white-space: pre;
            word-wrap: normal;
            word-break: normal;
            tab-size: 4;
            -webkit-font-feature-settings: "liga" 0, "calt" 0;
            font-feature-settings: "liga" 0, "calt" 0;
        }

        .markdown-body pre code {
            display: inline;
            padding: 0;
            margin: 0;
            background-color: transparent;
            border: 0;
            font-size: 100%;
        }

        .markdown-body ul, .markdown-body ol {
            margin-top: 0;
            margin-bottom: 16px;
            padding-left: 2em;
        }

        .markdown-body ul ul, .markdown-body ul ol, .markdown-body ol ol, .markdown-body ol ul {
            margin-top: 0;
            margin-bottom: 0;
        }

        .markdown-body li { margin: 0.25em 0; }
        .markdown-body li > p { margin-top: 16px; }

        .markdown-body blockquote {
            margin: 0 0 16px 0;
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
        }

        .markdown-body blockquote > :first-child { margin-top: 0; }
        .markdown-body blockquote > :last-child { margin-bottom: 0; }

        .markdown-body table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-top: 0;
            margin-bottom: 16px;
            width: 100%;
            overflow-x: auto;
            font-size: 0.875em;
            display: table;
            table-layout: auto;
        }

        .markdown-body table thead { display: table-header-group; }
        .markdown-body table tbody { display: table-row-group; }
        .markdown-body table tr { display: table-row; background-color: #ffffff; border-top: 1px solid #c6cbd1; }
        .markdown-body table tr:nth-child(2n) { background-color: #f6f8fa; }

        .markdown-body table th {
            display: table-cell;
            font-weight: 600;
            background-color: #f6f8fa;
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
            text-align: left;
            white-space: nowrap;
        }

        .markdown-body table td {
            display: table-cell;
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
            text-align: left;
        }

        .markdown-body table td, .markdown-body table th {
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .markdown-body hr { height: 0.25em; padding: 0; margin: 24px 0; background-color: #e1e4e8; border: 0; }
        .markdown-body img { max-width: 100%; box-sizing: content-box; background-color: #ffffff; }
        .katex-display { margin: 16px 0; overflow-x: auto; overflow-y: hidden; }

        .github-header { background-color: #f6f8fa; border-bottom: 1px solid #e1e4e8; padding: 16px 0; margin-bottom: 24px; }
        .github-header-content { max-width: 980px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
        .github-header-title { font-size: 14px; font-weight: 600; color: #24292e; }
        .github-header-actions { display: flex; gap: 8px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            border: 1px solid rgba(27, 31, 35, 0.15);
            border-radius: 6px;
            background-color: #f6f8fa;
            color: #24292e;
            text-decoration: none;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn:hover { background-color: #f3f4f6; border-color: rgba(27, 31, 35, 0.3); text-decoration: none; }

        .loading { text-align: center; padding: 64px 16px; color: #6a737d; }
        .spinner { width: 32px; height: 32px; border: 2px solid #e1e4e8; border-top-color: #0366d6; border-radius: 50%; animation: spinner 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spinner { to { transform: rotate(360deg); } }
        .error-message { text-align: center; padding: 64px 16px; color: #cb2431; }

        @media (max-width: 767px) {
            .page-container { padding: 16px 0; }
            .content { padding: 0 16px; }
            .markdown-body h1 { font-size: 1.8em; }
            .markdown-body h2 { font-size: 1.5em; }
            .markdown-body h3 { font-size: 1.25em; }
            .markdown-body table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }

        @media print {
            .github-header { display: none; }
            .btn { display: none; }
            .markdown-body table { display: table; table-layout: fixed; }
        }

        ::selection { background-color: #0366d6; color: #ffffff; }
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 6px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div class="github-header">
        <div class="github-header-content">
            <div class="github-header-title">001.md</div>
            <div class="github-header-actions">
                <a href="index.html" class="btn">← 返回主页</a>
            </div>
        </div>
    </div>

    <div class="page-container">
        <div class="content">
            <div id="markdown-content" class="markdown-body">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载文档...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        const LOAD_SEQUENCE = [
            { id: 'markdown-it', src: 'https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js', global: 'markdownit' },
            { id: 'markdown-it-anchor', src: 'https://cdn.jsdelivr.net/npm/markdown-it-anchor@8.6.7/dist/markdownItAnchor.umd.min.js', global: 'markdownItAnchor' },
            { id: 'katex', src: 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js', global: 'katex' },
            { id: 'katex-render', src: 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js', global: 'renderMathInElement' },
            { id: 'highlight.js', src: 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js', global: 'hljs' }
        ];

        const loaded = {};
        const loadQueue = [];

        function slugify(s) {
            return encodeURIComponent(String(s).trim().toLowerCase().replace(/\s+/g, '-'));
        }

        async function loadScript(index) {
            if (index >= LOAD_SEQUENCE.length) {
                initMarkdown();
                return;
            }

            const item = LOAD_SEQUENCE[index];
            if (loaded[item.id]) {
                await loadScript(index + 1);
                return;
            }

            try {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = item.src;
                    script.integrity = item.integrity || '';
                    script.crossOrigin = 'anonymous';
                    script.onload = () => {
                        loaded[item.id] = true;
                        resolve();
                    };
                    script.onerror = () => reject(new Error(`Failed to load ${item.src}`));
                    document.head.appendChild(script);
                });
            } catch (e) {
                console.error('Script load error:', e);
                document.getElementById('markdown-content').innerHTML = `
                    <div class="error-message">
                        <h2>⚠️ 加载失败</h2>
                        <p>部分资源加载失败，请刷新重试。</p>
                    </div>
                `;
                return;
            }

            await loadScript(index + 1);
        }

        function initMarkdown() {
            const md = window.markdownit({
                html: true,
                linkify: true,
                typographer: true,
                breaks: false,
                highlight: function (str, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(str, { language: lang }).value;
                        } catch (__) {}
                    }
                    return md.utils.escapeHtml(str);
                }
            });

            // 检查 markdown-it-anchor 是否正确加载
            if (typeof window.markdownItAnchor === 'function') {
                md.use(window.markdownItAnchor, {
                    level: [1, 2, 3, 4, 5, 6],
                    slugify: slugify,
                    permalink: false
                });
            } else {
                console.warn('markdown-it-anchor 插件未加载，标题锚点功能不可用');
            }

            loadMarkdown(md);
        }

        async function loadMarkdown(md) {
            const contentEl = document.getElementById('markdown-content');
            
            try {
                const response = await fetch('001.md', { cache: 'force-cache' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const markdownText = await response.text();
                const startTime = performance.now();
                
                const html = md.render(markdownText);
                contentEl.innerHTML = html;
                
                if (typeof renderMathInElement === 'function') {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false,
                        strict: false
                    });
                }

                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                const renderTime = (performance.now() - startTime).toFixed(2);
                console.log(`Markdown渲染完成，耗时: ${renderTime}ms`);

            } catch (error) {
                console.error('加载失败:', error);
                contentEl.innerHTML = `
                    <div class="error-message">
                        <h2>❌ 加载失败</h2>
                        <p>无法加载Markdown文件</p>
                        <p style="font-size: 14px; color: #6a737d; margin-top: 16px;">${error.message}</p>
                    </div>
                `;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => loadScript(0));
        } else {
            loadScript(0);
        }
    })();
    </script>
</body>
</html>
